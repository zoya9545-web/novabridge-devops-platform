<!DOCTYPE html>
<html>
<head>
    <title>NovaBridge Fashion Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <h1>NovaBridge Fashion Store</h1>
        <ul>
            <li>Home</li>
            <li>Men</li>
            <li>Women</li>
            <li>Kids</li>
            <li>Contact</li>
        </ul>
    </div>

    <div class="banner">
        <h2>🔥 Summer Sale - Flat 30% OFF 🔥</h2>
    </div>

    <div class="products">

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="T-Shirt">
            <h3>Men's T-Shirt</h3>
            <p>₹999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Dress">
            <h3>Women's Dress</h3>
            <p>₹1499</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Jacket">
            <h3>Winter Jacket</h3>
            <p>₹1999</p>
            <button>Buy Now</button>
        </div>

    </div>

    <footer>
        <p>© 2026 NovaBridge Fashion Store</p>
    </footer>

</body>
</html>
